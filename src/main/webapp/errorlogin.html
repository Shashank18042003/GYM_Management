<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Failed</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .error-box {
            max-width: 400px;
            margin: auto;
            margin-top: 120px;
        }
    </style>
</head>

<body>

<div class="card shadow text-center p-4 error-box">

    <!-- Error Icon -->
    <h1 class="text-danger">❌</h1>

    <!-- Message -->
    <h4 class="mt-3">Sign In Failed</h4>
    <p class="text-muted">Your email or password is incorrect</p>

    <!-- Button -->
    <a href="login.html" class="btn btn-primary mt-3">
        Back to Login
    </a>

</div>

</body>
</html>
