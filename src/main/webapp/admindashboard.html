<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background-color: #343a40;
            color: white;
        }

        /* Main Content */
        .content {
            padding: 20px;
        }

        .card-box {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">

            <h4 class="text-center mb-4">Admin Panel</h4>

            <a href="userregister.html"><i class="bi bi-person-plus"></i> User Register</a>
            <a href="#"><i class="bi bi-people"></i> User Details</a>
            <a href="#"><i class="bi bi-calendar-event"></i> Add Events</a>
            <a href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a>

        </div>

        <!-- 🔹 Main Content -->
        <div class="col-md-9 col-lg-10 content">

            <h2>Welcome Admin 👋</h2>
            <p class="text-muted">Manage your gym system here</p>

            <div class="row mt-4">

                <!-- Card 1 -->
                <div class="col-md-4">
                    <div class="card shadow p-3 card-box">
                        <h5>Total Users</h5>
                        <h3>120</h3>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="col-md-4">
                    <div class="card shadow p-3 card-box">
                        <h5>Active Members</h5>
                        <h3>85</h3>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="col-md-4">
                    <div class="card shadow p-3 card-box">
                        <h5>Events</h5>
                        <h3>5</h3>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
