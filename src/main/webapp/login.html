<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gym Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: url('login.jpg') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
}

.login-card {
    position: relative;
    z-index: 1;
    width: 360px;
    padding: 25px;
    border-radius: 16px;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(148,163,184,0.2);
    color: white;
}

.form-control {
    background: rgba(0,0,0,0.4);
    color: white;
    border-radius: 8px;
}

.btn-primary {
    background: linear-gradient(135deg,#1d4ed8,#4f46e5);
    border: none;
}

.link-muted {
    color: #9ecbff;
    text-decoration: none;
}
.login-subtext {
    color: rgba(255,255,255,0.8);
    text-align: center;
}
</style>
</head>

<body>

<div class="login-card">

<h3 class="text-center mb-2">Elite Fitness</h3>
<p class="login-subtext mb-3">Log in to your Fitness Journey</p>

<!-- ✅ ERROR MESSAGE -->
<div id="errorBox" class="alert alert-danger py-2 d-none text-center">
    Invalid email or password
</div>

<!-- SUCCESS MESSAGE -->
<div id="successBox" class="alert alert-success py-2 d-none text-center">
    Registration successful. Please login.
</div>

<form action="Login" method="get">

    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" name="email" required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control" name="password" required>
    </div>

    <button class="btn btn-primary w-100 mb-3">Login</button>

    <div class="text-center">
        <a href="userregister.jsp" class="link-muted">Create account</a>
    </div>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

// ❌ LOGIN ERROR
if (params.get("error") === "1") {
    document.getElementById("errorBox").classList.remove("d-none");

    // 🔥 REMOVE PARAM AFTER SHOWING
    window.history.replaceState({}, document.title, window.location.pathname);
}

// ✅ REGISTER SUCCESS
if (params.get("registered") === "1") {
    document.getElementById("successBox").classList.remove("d-none");

    // 🔥 REMOVE PARAM AFTER SHOWING
    window.history.replaceState({}, document.title, window.location.pathname);
}
</script>

</body>
</html>
