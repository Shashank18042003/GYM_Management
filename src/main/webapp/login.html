<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gym Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND IMAGE */
body {
    height: 100vh;
    background: url('login.jpg') no-repeat center center/cover;
    position: relative;
}

/* DARK OVERLAY (REAL FIX) */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55); /* slightly lighter than before */
    z-index: 0;
}

/* CENTER CONTENT */
body {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN CARD */
.login-card {
    position: relative;
    z-index: 1;

    width: 380px;
    border-radius: 18px;
    padding: 25px;

    background: rgba(30, 41, 59, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(148, 163, 184, 0.25);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);

    color: #e2e8f0;
}

/* TEXT */
.brand {
    font-weight: 800;
    text-align: center;
}

.text-muted {
    color: rgba(200, 200, 200, 0.8) !important;
}

/* INPUTS */
.form-control {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(148, 163, 184, 0.3);
    color: white;
    border-radius: 10px;
}

.form-control::placeholder {
    color: rgba(200, 200, 200, 0.6);
}

.form-control:focus {
    box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.3);
    border-color: #3b82f6;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(135deg, #1d4ed8, #4f46e5);
    border: none;
    border-radius: 12px;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #2563eb, #6366f1);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    transform: translateY(-1px);
}

/* LINKS */
.link-muted {
    color: #9ecbff;
    text-decoration: none;
}

.link-muted:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-card">

    <h3 class="mb-2 brand">Gym System</h3>
    <p class="text-center text-muted mb-4">Sign in to continue</p>

    <div id="registerBanner" class="alert alert-success py-2 d-none" role="alert">
        Registration successful. Please login.
    </div>

    <form onsubmit="return validateLogin()" action="Login" method="get">

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password">
        </div>

        <p id="errorMsg" class="text-danger text-center"></p>

        <button class="btn btn-primary w-100 mb-3">Login</button>

        <div class="text-center">
            <small class="text-muted">Forgot password? (optional)</small>
        </div>

        <div class="text-center mt-1">
            <a href="userregister.jsp" class="link-muted">Create an account</a>
        </div>

    </form>
</div>

<script src="script.js"></script>

<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get("registered") === "1") {
        const banner = document.getElementById("registerBanner");
        if (banner) banner.classList.remove("d-none");
    }
})();
</script>

</body>
</html>
