<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at 15% 10%, rgba(59, 130, 246, 0.18), transparent 30%),
                        radial-gradient(circle at 85% 10%, rgba(167, 139, 250, 0.14), transparent 28%),
                        linear-gradient(145deg, #0b1220, #0f172a 55%, #111827);
        }
        .login-card {
            width: 380px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: linear-gradient(160deg, rgba(30, 41, 59, 0.74), rgba(15, 23, 42, 0.64));
            color: #e2e8f0;
            border-radius: 18px;
        }
        .login-card .text-muted { color: rgba(148, 163, 184, 0.92) !important; }
        .brand {
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        .form-control {
            background: rgba(2, 6, 23, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.22);
            color: #e2e8f0;
            border-radius: 12px;
        }
        .form-control::placeholder { color: rgba(148, 163, 184, 0.8); }
        .form-control:focus {
            box-shadow: 0 0 0 .2rem rgba(59, 130, 246, 0.18);
            border-color: rgba(59, 130, 246, 0.5);
        }
        .btn-primary {
            background: linear-gradient(120deg, #2563eb, #7c3aed);
            border: 0;
            border-radius: 12px;
            font-weight: 700;
        }
        a.link-muted { color: rgba(191, 219, 254, 0.9); text-decoration: none; }
        a.link-muted:hover { text-decoration: underline; }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4 login-card">
    
    <h3 class="text-center mb-2 brand">Gym System</h3>
    <p class="text-center text-muted mb-4">Sign in to continue</p>

    <form onsubmit="return validateLogin()" action="Login" method="get">

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter email">
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password">
        </div>

        <!-- Error -->
        <p id="errorMsg" class="text-danger text-center"></p>

        <!-- Login Button -->
        <button class="btn btn-primary w-100 mb-3">Login</button>

        <!-- Extra -->
        <div class="text-center">
            <small class="text-muted">Forgot password? (optional)</small>
        </div>
        <div class="text-center mt-1">
            <a href="userregister.jsp" class="link-muted">Create an account</a>
        </div>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
