<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Already Exists</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .error-box {
            max-width: 420px;
            margin: auto;
            margin-top: 120px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card shadow p-4 error-box">

    <!-- Warning Icon -->
    <h1 class="text-warning">⚠</h1>

    <!-- Message -->
    <h4 class="mt-3">User Already Exists</h4>
    <p class="text-muted">
        A user with this email already exists. Please try with a different email.
    </p>

    <!-- Actions -->
    <div class="mt-3">
        <a href="userregister.html" class="btn btn-outline-primary btn-sm me-2">
            Try Again
        </a>

        <a href="admindashboard.html" class="btn btn-primary btn-sm">
            Go to Dashboard
        </a>
    </div>

</div>

</body>
</html>
